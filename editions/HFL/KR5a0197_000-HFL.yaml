front:
  text: 雷霆玉樞宥罪法懴恭聞髙上神霄之天九天應元之府遼邈豈惟於劫仭感通端自於一心恭燃道德之眞香仰叩虚无之聖境謹憑一炷徧達萬靈以今臣等皈命投誠啓告供養无上至眞道經師寳三境髙尊九天應元雷聲普化天尊九霄雷霆帝眞卿師使相十方諸天帝君三十六天上聖玉樞啓教雷師皓翁眞君雷部官衆三界萬靈恭望洪慈俯垂降格普仗眞香悉同供養臣聞赤書玉字昔元始開碧落以度人鳳笈龍章由雷師自神霄而闡化恭惟九天應元雷聲普化天尊道前號應九天貞明之大聖寔乃玉清眞王之化身恩被十方德沾萬彚統天三十六天天歸宰制之權歷劫千五百劫劫軫慈悲之念苟運寸誠而稱誦當令萬願以克從凡所希求悉應其感臣等以今謹爲入事意向來誠意巳具敷宣諒沐髙眞俯垂省覽伏惟九天應元雷聲普化天尊大聖大慈至皇至道爲羣生父爲萬靈師若人稱名咸得如意以今臣法衆等謹與某恭對道前志心皈依䖍誠朝禮九天應元雷聲普化天尊睿號自一天至三十六天由一拜至三十六拜聲聲不息拜拜無停恭望道慈流光寳座俯鑑由中之悃曲垂從欲之仁臣等下情無任瞻望恩光激切屏營之至謹啓
