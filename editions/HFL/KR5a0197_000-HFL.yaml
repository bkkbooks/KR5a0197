body:
  text: 次讃曰祖炁氤氲滿太虚九天元是九天居驅雷役兩飛金篆活物生人備玉樞三界有情皆得度十方無路不通車大哉普化明元始日月齊光信不誣衆和皈命禮大哉普化天尊臣聞一炁分眞九天布化至皇至道爲羣生父爲萬靈師亘古亘今運三界心總五雷令調和隂陽而陶冶萬物經緯天地而作成四時身坐玉梵層臺手舉金光如意宣說玉樞妙旨傳授雷師皓翁普利益於衆生遂流通於下士如先覺如後覺皆知奉於眞宗若有知若無知悉超悟於至道臣等欽承寳訓得閱琅書洪惟普化天尊抑乃長生大帝主治九天應元之府總制五雷斬勘之司鑑觀萬天浮游三界掌雷部鬼神之録握人間善惡之權賞罰無私毫分罔失儲勲累行者則登庸簡録邪心不孝者則斬神誅魂是故皈命神霄投誠玉府切念某等凡胎濁質走肉行尸歷劫迨今罪如山積心三惡業貪嗔愚癡身三惡業殺盜邪婬口四惡業兩舌惡罵綺語妄言起心動念恣意妄行䙝瀆聖眞冒觸天地呵毀風雨祼露星辰違背君師忤逆父母欺凌孤弱傲睨親朋殺害群生抛撒五榖大秤小斗人百己千酷法嚴刑强侵冒占姧私邪婬妖巫叛逆從微至著日積月深遂至鬼妬神憎天嗔地怒諸如罪犯無路首陳今對道前求哀懴悔伏願雷聲普化帝德好生赦前生今世之愆悉同冰泮禳三衰九横之厄咸似雪消俾身位之安寧冀門庭之清肅見存眷屬舉臻覆護而享康榮過往祖先俱沐超凌而登快樂臣等稱揚名號著想尊容遥瞻三十六天傾心皈敬求懴百千萬罪隨念解除各運恭虔先伸讃詠天尊千五百劫先清淨心發廣大願普願未來一切衆諸天諸地十方界若或有人聞吾名皈命一聲悉超渙今日臣等皈命禮九光殿中曲宻房玉梵七寳層臺上九天貞明大聖尊惟願不捨當來誓肸蠁垂光燭道場龍旂鸞輅倐飄颻三十六天同下盻臣等小兆多生幸一心皈向普化君志心朝禮毎一天下稱和禮拜聖號一聲髙上道寂天髙上陽岐天志心朝禮九天應元雷聲普化天尊髙上洞光天髙上紫沖天髙上玉靈天髙上淸虚天志心朝禮九天應元雷聲普化天尊髙上微果天髙上正心天髙上道元天髙上太皇天志心朝禮九天應元雷聲普化天尊髙上玄沖天髙上極眞天髙上梵炁天髙上輔帝天志心朝禮九天應元雷聲普化天尊髙上玄宗天髙上歴偏天髙上左罡天髙上主化天志心朝禮九天應元雷聲普化天尊髙上符臨天髙上保華天髙上定精天髙上靑華天志心朝禮九天應元雷聲普化天尊髙上景琅天髙上丹精天髙上安墠天髙上廣宗天志心朝禮九天應元雷聲普化天尊髙上浩帝天髙上希玄天髙上慶含天髙上天婁天志心朝禮九天應元雷聲普化天尊髙上變仙天髙上昇玄天髙上敬皇天髙上移神天志心朝禮九天應元雷聲普化天尊髙上瓊靈天髙上昇極天圍繞讃曰无上玉清王統天三十六九天普化君化形十方界披髪騎麒麟赤脚躡層冰手把九天炁嘯風鞭雷霆能以智慧力攝伏諸魔精濟度長夜魂利益於衆生如彼銀河水千眼千月輪誓於未來世永敭天尊教禮足各長跪懴悔臣法衆等志心皈身皈神皈命无上三寳髙尊九天應元雷聲普化天尊雷霆列聖在會群眞伏望大慈同垂巨澤普降洪恩以今臣等皈命投誠一心懴悔切念某爰從曩劫乃至今生故犯誤違千愆萬罪日深月積曽未披陳殺盜邪婬貪嗔癡愛是非海闊人我山髙或損害有情侵傷物命或迷眞背道犯戒違科釁結幽司名拘隂籍或在七元曹局之内或在三官府署之中或下鬼之訴誣或上天之譴責未蒙原赦恐致纏綿兼慮九曜嶔㠌五行竒蹇隂陽交運甲子分元或逢六害七傷或值孤辰寡宿流年衝併本命衰微劫殺亡神天羅地網或土木方隅之有犯或水火囚獄之爲災呪詛侵凌𡨚讎報對菑凶罔測迍滯多端非頼懴陳曷由解釋仰祈上聖俯鑑愚𠂻祈巨澤於方來赦多愆於巳往灾隨電掃福逐雲生行藏消非横之虞視履納泰和之慶星辰順度運限開通一切時中永依道䕃志心稽首禮謝无上至眞三寳三啓頌三禮謝經囬向向來禮懴經功德巳遂周圓恭對道前特伸囬向伏願三寳髙尊九天上聖雷部官衆三界萬靈同賜鑑明普垂福佑降九霄五雷之炁敷錫其人赦千生萬劫之愆消除諸障恭望天尊大慈天尊大聖隨心叶禱應念而成俾令某身命永堅室家胥慶所求者遂所感者通所欲者從所禳者却此生他世常遇正因一切有情同登道岸爲上因縁稽首稱念三淸三境天尊雷聲普化天尊玄恩赦罪天尊福生無量天尊不可思議功德雷霆玉樞宥罪法懴
